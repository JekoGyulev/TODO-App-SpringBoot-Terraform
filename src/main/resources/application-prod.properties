spring.application.name=TODO-App-Terraform

# MySQL DB (prod)
spring.datasource.url=jdbc:mysql://mysql-server-jeko.mysql.database.azure.com:3306/todoapp_db_jeko?useSSL=true
spring.datasource.username=${AZURE_MYSQL_USERNAME}
spring.datasource.password=${AZURE_MYSQL_PASSWORD}

spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql = TRUE


# JPA Hibernate
spring.jpa.hibernate.ddl-auto=update

###Logging Levels
#Disable the default loggers
logging.level.org = WARN
logging.level.blog = WARN

#Show SQL executed
logging.level.org.hibernate.SQL = DEBUG
logging.level.org.hibernate.type.descriptor = TRACE


spring.mvc.hiddenmethod.filter.enabled=true
