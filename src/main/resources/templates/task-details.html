<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
<div class="bg-white shadow-xl rounded-lg p-8 w-full max-w-md">
    <h1 class="text-2xl font-bold mb-4 text-center">Task Details</h1>
    <p><span class="font-semibold">Title:</span> <span th:text="${task.title}"></span></p>
    <p><span class="font-semibold">Description:</span> <span th:text="${task.description != null ? task.description : 'N/A'}"></span></p>
    <p><span class="font-semibold">Created At:</span> <span th:text="${#temporals.format(task.createdAt, 'yyyy-MM-dd HH:mm')}"></span></p>

    <div class="mt-4 text-center">
        <a th:href="@{/}" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Back to Tasks</a>
    </div>
</div>
</body>
</html>
